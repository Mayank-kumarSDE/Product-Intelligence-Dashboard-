services:
  postgres:
    image: postgres:16
    container_name: quantacus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quantacus
    ports:
      - "5433:5432"
    volumes:
      - quantacus_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: quantacus-redis
    ports:
      - "6379:6379"

volumes:
  quantacus_pg:
