databases:
  - name: quantacus-db
    plan: free
    databaseName: quantacus
    user: quantacus_user

services:
  - type: redis
    name: quantacus-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: quantacus-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run db:sync
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        value: https://quantacus-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: quantacus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quantacus-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: 587
      - key: NOTIFICATION_FROM
        value: "Quantacus <no-reply@quantacus.local>"

  - type: web
    name: quantacus-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL 
        value: https://quantacus-backend.onrender.com
